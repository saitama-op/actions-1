name: exploring variables and secrets

on: push

env:
    REGISTRY: docker.io
    DOCKER_USERNAME: dockerhublogin
    IMAGE_NAME: go-release:1.6.8

jobs:
    docker_build:
        env:
            DOCKER_PASSWD: dockerpasswd
        runs-on: ubuntu-latest
        steps:
         - name: build image
           run: echo "docker build -t ${{ env.REGISTRY}}/${{ env.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}"

         - name: docker login
           run: echo "docker login --username=${{env.DOCKER_USERNAME}} --password=${{env.DOCKER_PASSWD}}"
    
         - name: docker push image
           run: echo "docker push ${{env.IMAGE_NAME}}""

    docker_run:
        runs-on: ubuntu-latest
        steps:
            - name: run docker
              run: echo "docker run -d ${{env.REGISTRY}}/${{env.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}"