name: exploring variables and secrets

on: push

env:
    IMAGE_NAME: go-release:1.6.8

jobs:
    docker_build:
        runs-on: ubuntu-latest
        steps:
         - name: build image
           run: echo "docker build -t $REGISTRY/$DOCKER_USERNAME/${{env.IMAGE_NAME}}"

         - name: docker login
           run: echo "docker login --username=$DOCKER_USERNAME --password=${{secrets.DOCKER_PASSWORD}}"
    
         - name: docker push image
           run: echo "docker push ${{env.IMAGE_NAME}}"

    docker_run:
        needs: docker_build
        runs-on: ubuntu-latest
        steps:
            - name: run docker
              run: echo "docker run -d $REGISTRY/env.DOCKER_USERNAME/${{env.IMAGE_NAME}}"